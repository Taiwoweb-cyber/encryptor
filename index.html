<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure App with Login</title>

<style>
  body {
    font-family: Arial;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }

  .primary { background: #2196F3; color: white; }
  .success { background: #4CAF50; color: white; }
  .danger { background: #f44336; color: white; }

  .hidden { display: none; }
</style>
</head>

<body>

<!-- LOGIN / SIGNUP -->
<div class="card" id="authCard">
  <h2>🔐 Login / Signup</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button class="success" onclick="signup()">Sign Up</button>
  <button class="primary" onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="card hidden" id="appCard">
  <h2>🔐 Secure Tool</h2>

  <textarea id="message" placeholder="Enter message"></textarea>
  <input type="text" id="key" placeholder="Secret key">

  <button class="success" onclick="encrypt()">Encrypt</button>
  <button class="primary" onclick="decrypt()">Decrypt</button>

  <textarea id="output" placeholder="Result"></textarea>

  <button class="danger" onclick="logout()">Logout</button>
</div>

<!-- CryptoJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
// Check if already logged in
window.onload = function() {
  if (localStorage.getItem("loggedIn") === "true") {
    showApp();
  }
};

// SIGNUP
function signup() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (!user || !pass) {
    alert("Enter username and password");
    return;
  }

  localStorage.setItem("user", user);
  localStorage.setItem("pass", pass);

  alert("Signup successful! Now login.");
}

// LOGIN
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const storedUser = localStorage.getItem("user");
  const storedPass = localStorage.getItem("pass");

  if (user === storedUser && pass === storedPass) {
    localStorage.setItem("loggedIn", "true");
    showApp();
  } else {
    alert("Invalid credentials");
  }
}

// SHOW APP
function showApp() {
  document.getElementById("authCard").classList.add("hidden");
  document.getElementById("appCard").classList.remove("hidden");
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedIn");
  location.reload();
}

// ENCRYPT
function encrypt() {
  const msg = document.getElementById("message").value;
  const key = document.getElementById("key").value;

  if (!msg || !key) {
    alert("Enter message and key");
    return;
  }

  const encrypted = CryptoJS.AES.encrypt(msg, key).toString();
  document.getElementById("output").value = encrypted;
}

// DECRYPT
function decrypt() {
  const msg = document.getElementById("message").value;
  const key = document.getElementById("key").value;

  try {
    const bytes = CryptoJS.AES.decrypt(msg, key);
    const decrypted = bytes.toString(CryptoJS.enc.Utf8);

    if (!decrypted) throw "error";

    document.getElementById("output").value = decrypted;
  } catch {
    document.getElementById("output").value = "Invalid key or message!";
  }
}
</script>

</body>
</html>
